<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Siri AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: #000;
    color: #fff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .close-btn {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    border: none;
    color: #fff;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .center-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .siri-orb {
    width: 160px;
    height: 160px;
    position: relative;
    animation: orbFloat 4s ease-in-out infinite;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-8px) scale(1.02); }
  }

  .siri-orb canvas {
    width: 100%;
    height: 100%;
  }

  .listening .siri-orb {
    animation: orbPulse 1.5s ease-in-out infinite;
  }
  @keyframes orbPulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.08); filter: brightness(1.4); }
  }

  .bottom-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px 34px;
  }

  .btn-plus {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    border: none;
    color: #8e8e93;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .btn-plus:hover { background: rgba(255,255,255,0.2); }

  .input-wrap {
    flex: 1;
    position: relative;
  }
  .input-wrap input {
    width: 100%;
    height: 44px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 0 18px;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .input-wrap input::placeholder {
    color: #8e8e93;
  }
  .input-wrap input:focus {
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.14);
  }

  .btn-mic {
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    border: none;
    color: #8e8e93;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }
  .btn-mic:hover { background: rgba(255,255,255,0.2); }
  .btn-mic.active {
    background: rgba(48,209,88,0.25);
    color: #30d158;
    animation: micPulse 1s ease-in-out infinite;
  }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(48,209,88,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(48,209,88,0); }
  }

  .response-area {
    padding: 0 20px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, padding 0.4s ease;
  }
  .response-area.show {
    max-height: 300px;
    padding: 10px 20px 20px;
    overflow-y: auto;
  }
  .response-bubble {
    background: rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 14px 18px;
    font-size: 15px;
    line-height: 1.5;
    color: rgba(255,255,255,0.9);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .voice-waves {
    display: none;
    gap: 3px;
    align-items: center;
    justify-content: center;
    height: 30px;
    margin-bottom: 10px;
  }
  .listening .voice-waves { display: flex; }
  .voice-waves span {
    width: 3px;
    height: 6px;
    background: #30d158;
    border-radius: 2px;
    animation: wave 0.6s ease-in-out infinite;
  }
  .voice-waves span:nth-child(1) { animation-delay: 0s; }
  .voice-waves span:nth-child(2) { animation-delay: 0.1s; }
  .voice-waves span:nth-child(3) { animation-delay: 0.2s; }
  .voice-waves span:nth-child(4) { animation-delay: 0.3s; }
  .voice-waves span:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 22px; }
  }
</style>
</head>
<body>
  <button class="close-btn" id="closeBtn">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M1 1L13 13M13 1L1 13" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <div class="center-area" id="mainArea">
    <div class="voice-waves" id="voiceWaves">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="siri-orb" id="siriOrb">
      <canvas id="orbCanvas" width="320" height="320"></canvas>
    </div>
  </div>

  <div class="response-area" id="responseArea">
    <div class="response-bubble" id="responseBubble"></div>
  </div>

  <div class="bottom-bar">
    <button class="btn-plus" id="plusBtn">+</button>
    <div class="input-wrap">
      <input type="text" id="textInput" placeholder="Спросить Siri" autocomplete="off" />
    </div>
    <button class="btn-mic" id="micBtn">
      <svg width="18" height="24" viewBox="0 0 18 24" fill="none">
        <rect x="5" y="1" width="8" height="14" rx="4" stroke="currentColor" stroke-width="1.8"/>
        <path d="M1 11C1 15.4 4.6 19 9 19C13.4 19 17 15.4 17 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="9" y1="19" x2="9" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

<script src="commands.js"></script>
<script>
const canvas = document.getElementById('orbCanvas');
const ctx = canvas.getContext('2d');
let w = 320, h = 320, cx = w/2, cy = h/2;
let frame = 0;
let isListening = false;
let recognition = null;
let isSpeaking = false;

function drawOrb() {
  ctx.clearRect(0, 0, w, h);
  frame += 0.015;
  const baseR = 68;
  const t = frame;

  for (let i = 0; i < 3; i++) {
    const phase = t + i * 2.1;
    const r = baseR + Math.sin(phase * 0.7) * 6;
    const xOff = Math.sin(phase * 0.5) * 12;
    const yOff = Math.cos(phase * 0.4) * 10;
    ctx.beginPath();
    ctx.ellipse(cx + xOff, cy + yOff, r, r * 0.85, Math.sin(phase * 0.3) * 0.3, 0, Math.PI * 2);
    ctx.closePath();
  }

  ctx.globalCompositeOperation = 'source-over';
  const grad = ctx.createRadialGradient(cx - 10, cy - 10, 0, cx, cy, 80);
  grad.addColorStop(0, 'rgba(80, 80, 80, 0.5)');
  grad.addColorStop(0.5, 'rgba(50, 50, 50, 0.4)');
  grad.addColorStop(1, 'rgba(30, 30, 30, 0.1)');

  for (let i = 0; i < 3; i++) {
    const phase = t + i * 2.1;
    const r = baseR + Math.sin(phase * 0.7) * 6;
    const xOff = Math.sin(phase * 0.5) * 12;
    const yOff = Math.cos(phase * 0.4) * 10;
    ctx.beginPath();
    ctx.ellipse(cx + xOff, cy + yOff, r, r * 0.85, Math.sin(phase * 0.3) * 0.3, 0, Math.PI * 2);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 75, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(80, 80, 80, 0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.beginPath();
  for (let x = -60; x <= 60; x += 1) {
    const normalX = x / 60;
    const mask = 1 - normalX * normalX;
    const y = Math.sin(normalX * Math.PI * 2 + t * 3) * 8 * mask;
    if (x === -60) ctx.moveTo(cx + x, cy + y);
    else ctx.lineTo(cx + x, cy + y);
  }
  ctx.strokeStyle = 'rgba(100, 100, 100, 0.5)';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  const glow = ctx.createRadialGradient(cx, cy, 40, cx, cy, 85);
  glow.addColorStop(0, 'rgba(255,255,255,0.03)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, w, h);

  requestAnimationFrame(drawOrb);
}

drawOrb();

const textInput = document.getElementById('textInput');
const micBtn = document.getElementById('micBtn');
const mainArea = document.getElementById('mainArea');
const responseArea = document.getElementById('responseArea');
const responseBubble = document.getElementById('responseBubble');

function getReply(text) {
  const lower = text.toLowerCase().trim();
  for (const cmd of commands) {
    for (const kw of cmd.keywords) {
      if (lower.includes(kw)) {
        return cmd.response;
      }
    }
  }
  return 'Хм, интересный вопрос. Попробуй переформулировать.';
}

function showResponse(text) {
  responseBubble.textContent = text;
  responseArea.classList.add('show');
}

function sendMessage() {
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = '';
  const reply = getReply(text);
  mainArea.classList.add('listening');
  setTimeout(() => {
    showResponse(reply);
    speak(reply);
    setTimeout(() => mainArea.classList.remove('listening'), 2000);
  }, 800);
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  isSpeaking = true;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ru-RU';
  utt.rate = 1;
  utt.onend = () => { isSpeaking = false; };
  speechSynthesis.speak(utt);
}

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

micBtn.addEventListener('click', () => {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showResponse('Распознавание речи не поддерживается в этом браузере.');
    return;
  }
  if (isListening) {
    if (recognition) recognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ru-RU';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('active');
    mainArea.classList.add('listening');
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    textInput.value = transcript;
    sendMessage();
  };

  recognition.onerror = (e) => {
    console.log('Speech error:', e.error);
    if (e.error === 'no-speech') {
      showResponse('Я тебя не услышал. Попробуй ещё раз.');
    }
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('active');
    if (!isSpeaking) mainArea.classList.remove('listening');
  };

  recognition.start();
});

document.getElementById('closeBtn').addEventListener('click', () => {
  responseArea.classList.remove('show');
  textInput.value = '';
  mainArea.classList.remove('listening');
});
</script>
</body>
</html>
