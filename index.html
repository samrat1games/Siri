<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="ai-logo.png">
<title>Siri AI v1.1.0</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:#000;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}

  .top-bar{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 16px;z-index:10}
  .icon-btn{width:36px;height:36px;background:rgba(255,255,255,0.12);border-radius:50%;border:none;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

  /* CHATS LIST */
  .chats-panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:#000;z-index:100;flex-direction:column}
  .chats-panel.show{display:flex}
  .chats-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:0.5px solid rgba(255,255,255,0.1)}
  .chats-header h3{font-size:17px;font-weight:600}
  .chats-header .new-chat{background:none;border:none;color:#0a84ff;font-size:15px;cursor:pointer}
  .chats-header .settings-link{background:none;border:none;color:#8e8e93;cursor:pointer;display:flex;align-items:center}
  .chats-list{flex:1;overflow-y:auto;padding:8px 0}
  .chat-item{padding:14px 16px;border-bottom:0.5px solid rgba(255,255,255,0.06);cursor:pointer;transition:background 0.15s;display:flex;gap:12px;align-items:center}
  .chat-item:active{background:rgba(255,255,255,0.05)}
  .chat-item-icon{width:40px;height:40px;background:rgba(255,255,255,0.08);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
  .chat-item-info{flex:1;min-width:0}
  .chat-item-title{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-item-preview{font-size:13px;color:#8e8e93;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-item-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .chat-item-time{font-size:11px;color:#48484a}
  .chat-item-del{background:none;border:none;color:#48484a;font-size:14px;cursor:pointer;padding:4px}
  .chats-empty{padding:60px 20px;text-align:center;color:#48484a;font-size:15px;line-height:1.5}

  /* SETTINGS */
  .settings-panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:#000;z-index:100;flex-direction:column;overflow-y:auto}
  .settings-panel.show{display:flex}
  .settings-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:0.5px solid rgba(255,255,255,0.1)}
  .settings-header .back-btn{background:none;border:none;color:#0a84ff;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:4px}
  .settings-header h3{font-size:17px;font-weight:600}
  .settings-content{flex:1;padding:20px 0}
  .settings-card{background:rgba(255,255,255,0.06);border-radius:14px;margin:0 16px 20px;overflow:hidden}
  .settings-card-header{padding:16px;text-align:center}
  .settings-card-header img{width:60px;height:60px;border-radius:14px;margin-bottom:10px}
  .settings-card-header h2{font-size:18px;font-weight:600;margin-bottom:4px}
  .settings-card-header p{font-size:13px;color:#8e8e93;line-height:1.4}
  .ios-section-title{font-size:13px;color:#8e8e93;text-transform:uppercase;letter-spacing:0.5px;padding:8px 16px 8px 32px}
  .ios-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid rgba(255,255,255,0.06);cursor:pointer;transition:background 0.15s}
  .ios-row:active{background:rgba(255,255,255,0.05)}
  .ios-row:last-child{border-bottom:none}
  .ios-row-left{display:flex;align-items:center;gap:12px}
  .ios-row-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
  .ios-row-label{font-size:16px}
  .ios-row-value{display:flex;align-items:center;gap:6px;color:#8e8e93;font-size:15px}
  .ios-row-value svg{width:14px;height:14px;color:#48484a}
  .ios-toggle{position:relative;width:51px;height:31px;background:#39393d;border-radius:16px;border:none;cursor:pointer;transition:background 0.3s;flex-shrink:0}
  .ios-toggle.on{background:#30d158}
  .ios-toggle::after{content:'';position:absolute;top:2px;left:2px;width:27px;height:27px;background:#fff;border-radius:50%;transition:transform 0.3s}
  .ios-toggle.on::after{transform:translateX(20px)}

  .lang-picker{display:none;position:absolute;bottom:0;left:0;right:0;background:rgba(28,28,30,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid rgba(255,255,255,0.1);border-radius:14px 14px 0 0;padding:8px;z-index:200;animation:su 0.3s ease}
  .lang-picker.show{display:block}
  @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .lang-picker-title{text-align:center;font-size:13px;color:#8e8e93;padding:8px 0 12px}
  .lang-option{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.06);border-radius:10px;margin-bottom:2px;cursor:pointer}
  .lang-option span,.voice-option span{font-size:16px}
  .lang-option .check,.voice-option .check{color:#30d158;font-size:18px;display:none}
  .lang-option.active .check,.voice-option.active .check{display:block}
  .voice-option{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.06);border-radius:10px;margin-bottom:2px;cursor:pointer}
  .overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:150}
  .overlay.show{display:block}

  .center-area{flex:1;display:flex;align-items:center;justify-content:center}
  .siri-orb{width:160px;height:160px;animation:orbFloat 4s ease-in-out infinite}
  @keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.02)}}
  .siri-orb img{width:160px;height:160px;object-fit:contain}
  .listening .siri-orb img{animation:orbPulse 1.5s ease-in-out infinite}
  @keyframes orbPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.08);filter:brightness(1.4)}}

  .chat-area{flex:1;overflow-y:auto;padding:60px 16px 10px;display:none;flex-direction:column;gap:10px}
  .chat-area.show{display:flex}
  .chat-msg{max-width:80%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.4;animation:fi 0.3s ease;word-wrap:break-word;white-space:pre-wrap}
  .chat-msg.user{align-self:flex-end;background:#0a84ff;color:#fff;border-bottom-right-radius:4px}
  .chat-msg.bot{align-self:flex-start;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.9);border-bottom-left-radius:4px}
  .chat-msg.bot code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-family:'SF Mono',monospace;font-size:13px}
  .chat-msg.bot pre{background:rgba(0,0,0,0.4);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;position:relative}
  .chat-msg.bot pre code{background:none;padding:0;font-size:13px;line-height:1.4}
  .chat-msg.bot code.lang-python{color:#61dafb}
  .chat-msg.bot code.lang-javascript{color:#f7df1e}
  .chat-msg.bot code.lang-js{color:#f7df1e}
  .chat-msg.bot code.lang-html{color:#e34c26}
  .chat-msg.bot code.lang-css{color:#264de4}
  .chat-msg.bot code.lang-bash{color:#4eaa25}
  .chat-msg.bot strong{color:#fff}
  .chat-msg.bot em{color:rgba(255,255,255,0.7)}
  .chat-msg.bot a{color:#0a84ff;text-decoration:underline}
  .chat-msg.bot h2,.chat-msg.bot h3,.chat-msg.bot h4{color:#fff;margin:8px 0 4px}
  .chat-msg.bot h2{font-size:18px}
  .chat-msg.bot h3{font-size:16px}
  .chat-msg.bot h4{font-size:15px;font-weight:600}
  .chat-msg.bot blockquote{border-left:3px solid #0a84ff;padding-left:10px;color:rgba(255,255,255,0.6);margin:6px 0;font-style:italic}
  .chat-msg.bot hr{border:none;border-top:1px solid rgba(255,255,255,0.15);margin:8px 0}
  .chat-msg.bot ul{padding-left:20px;margin:6px 0}
  .chat-msg.bot li{margin:2px 0;line-height:1.4}
  @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .bottom-bar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px 34px}
  .btn-plus{width:44px;height:44px;background:rgba(255,255,255,0.12);border-radius:50%;border:none;color:#8e8e93;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background 0.2s}
  .btn-plus:hover{background:rgba(255,255,255,0.2)}
  .input-wrap{flex:1}
  .input-wrap input{width:100%;height:44px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);border-radius:22px;padding:0 18px;color:#fff;font-size:16px;outline:none;transition:border-color 0.2s,background 0.2s}
  .input-wrap input::placeholder{color:#8e8e93}
  .input-wrap input:focus{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.14)}
  .btn-mic{width:44px;height:44px;background:rgba(255,255,255,0.12);border-radius:50%;border:none;color:#8e8e93;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background 0.2s,color 0.2s}
  .btn-mic:hover{background:rgba(255,255,255,0.2)}
  .btn-mic.active{background:rgba(48,209,88,0.25);color:#30d158;animation:mp 1s ease-in-out infinite}
  @keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(48,209,88,0.4)}50%{box-shadow:0 0 0 8px rgba(48,209,88,0)}}

  .voice-waves{display:none;gap:3px;align-items:center;justify-content:center;height:30px;margin-bottom:10px}
  .listening .voice-waves{display:flex}
  .voice-waves span{width:3px;height:6px;background:#30d158;border-radius:2px;animation:wv 0.6s ease-in-out infinite}
  .voice-waves span:nth-child(1){animation-delay:0s}
  .voice-waves span:nth-child(2){animation-delay:.1s}
  .voice-waves span:nth-child(3){animation-delay:.2s}
  .voice-waves span:nth-child(4){animation-delay:.3s}
  .voice-waves span:nth-child(5){animation-delay:.4s}
  @keyframes wv{0%,100%{height:6px}50%{height:22px}}

  .typing-indicator{display:none;align-self:flex-start;padding:12px 16px;background:rgba(255,255,255,0.1);border-radius:18px;border-bottom-left-radius:4px;gap:4px;animation:fi 0.3s ease}
  .typing-indicator.show{display:flex}
  .typing-indicator span{width:6px;height:6px;background:rgba(255,255,255,0.4);border-radius:50%;animation:td 1.4s ease-in-out infinite}
  .typing-indicator span:nth-child(2){animation-delay:.2s}
  .typing-indicator span:nth-child(3){animation-delay:.4s}
  @keyframes td{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
</style>
</head>

<script>
const API_KEY='AIzaSyDiCBTa9zXsf1E4NsiU2gizfUCmAqO9uyo';
const API_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent';
const CORS_PROXY='https://corsproxy.io/?';

const i18n={
  ru:{placeholder:'Спросить Siri',back:'Назад',chats:'Чаты',newChat:'+ Новый',settings:'Настройки',empty:'Нет чатов. Нажмите + чтобы начать.',user:'Вы',bot:'Siri',lang:'Язык',voice:'Голос',langTitle:'Язык Siri',voiceTitle:'Голос',heard:'Я тебя не услышал.'},
  en:{placeholder:'Ask Siri',back:'Back',chats:'Chats',newChat:'+ New',settings:'Settings',empty:'No chats. Tap + to start.',user:'You',bot:'Siri',lang:'Language',voice:'Voice',langTitle:'Siri Language',voiceTitle:'Voice',heard:"I didn't hear you."},
  uk:{placeholder:'Запитати Siri',back:'Назад',chats:'Чати',newChat:'+ Новий',settings:'Налаштування',empty:'Немає чатів. Натисніть + щоб почати.',user:'Ви',bot:'Siri',lang:'Мова',voice:'Голос',langTitle:'Мова Siri',voiceTitle:'Голос',heard:'Я тебе не почув.'}
};

let lang=localStorage.getItem('siri_lang')||'ru';
let selectedVoice=localStorage.getItem('siri_voice')||'Milena';
let allChats=JSON.parse(localStorage.getItem('siri_chats')||'[]');
let currentChatId=localStorage.getItem('siri_current_chat')||null;
let isListening=false,recognition=null,isSpeaking=false;

const $=id=>document.getElementById(id);
const textInput=$('textInput'),micBtn=$('micBtn'),mainArea=$('mainArea'),chatArea=$('chatArea');

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function getCurrentChat(){return allChats.find(c=>c.id===currentChatId)}
function saveChats(){localStorage.setItem('siri_chats',JSON.stringify(allChats));if(currentChatId)localStorage.setItem('siri_current_chat',currentChatId)}

function setLang(l){
  lang=l;localStorage.setItem('siri_lang',l);const t=i18n[l];
  textInput.placeholder=t.placeholder;
  $('chatsBackText').textContent=t.back;$('chatsTitle').textContent=t.chats;$('newChatBtn').textContent=t.newChat;$('settingsLabel').textContent=t.settings;
  $('settingsBackText').textContent=t.back;$('labelLang').textContent=t.lang;$('labelVoice').textContent=t.voice;
  $('langPickerTitle').textContent=t.langTitle;$('voicePickerTitle').textContent=t.voiceTitle;
  $('currentLang').textContent=l==='ru'?'Русский':l==='uk'?'Українська':'English';
  document.querySelectorAll('.lang-option').forEach(o=>o.classList.toggle('active',o.dataset.lang===l));
}

function setVoice(name){
  selectedVoice=name;localStorage.setItem('siri_voice',name);
  $('currentVoice').textContent=name;
  document.querySelectorAll('.voice-option').forEach(o=>o.classList.toggle('active',o.dataset.voice===name));
}

function renderMarkdown(text){
  let h=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>{
    const escaped=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<pre><code class="lang-'+lang+'">'+escaped+'</code></pre>';
  });
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^### (.+)$/gm,'<h4>$1</h4>');
  h=h.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^# (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^---$/gm,'<hr>');
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>');
  h=h.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>');
  h=h.replace(/(<li>[\s\S]*?<\/li>)/g,m=>'<ul>'+m+'</ul>');
  h=h.replace(/<\/ul>\s*<ul>/g,'');
  h=h.replace(/\n/g,'<br>');
  return h;
}

function renderChat(){
  chatArea.innerHTML='';const chat=getCurrentChat();
  if(!chat||!chat.messages.length)return;
  chat.messages.forEach(msg=>{
    const div=document.createElement('div');div.className='chat-msg '+(msg.role==='user'?'user':'bot');
    div.innerHTML=msg.role==='bot'?renderMarkdown(msg.text):msg.text;chatArea.appendChild(div);
  });
  chatArea.scrollTop=chatArea.scrollHeight;
}

function renderChatsList(){
  const list=$('chatsList'),t=i18n[lang];
  if(!allChats.length){list.innerHTML='<div class="chats-empty">'+t.empty+'</div>';return}
  list.innerHTML='';
  allChats.slice().reverse().forEach(chat=>{
    const div=document.createElement('div');div.className='chat-item';
    const firstMsg=chat.messages.find(m=>m.role==='user');
    const title=firstMsg?firstMsg.text.substring(0,40):(lang==='ru'?'Новый чат':lang==='uk'?'Новий чат':'New chat');
    const lastMsg=chat.messages[chat.messages.length-1];
    const preview=lastMsg?lastMsg.text.substring(0,60):'';
    const time=new Date(chat.updatedAt).toLocaleDateString(lang==='ru'?'ru-RU':lang==='uk'?'uk-UA':'en-US',{day:'numeric',month:'short'});
    div.innerHTML='<div class="chat-item-icon">💬</div><div class="chat-item-info"><div class="chat-item-title">'+title+'</div><div class="chat-item-preview">'+preview+'</div></div><div class="chat-item-meta"><span class="chat-item-time">'+time+'</span><button class="chat-item-del" data-id="'+chat.id+'">✕</button></div>';
    div.onclick=(e)=>{if(e.target.classList.contains('chat-item-del'))return;openChat(chat.id)};
    list.appendChild(div);
  });
  list.querySelectorAll('.chat-item-del').forEach(btn=>{
    btn.onclick=(e)=>{e.stopPropagation();deleteChat(btn.dataset.id)};
  });
}

function newChat(){const id=genId();allChats.push({id,messages:[],createdAt:Date.now(),updatedAt:Date.now()});currentChatId=id;saveChats();$('chatsPanel').classList.remove('show');showMain()}

function openChat(id){currentChatId=id;saveChats();$('chatsPanel').classList.remove('show');showMain();renderChat()}

function deleteChat(id){allChats=allChats.filter(c=>c.id!==id);if(currentChatId===id){currentChatId=allChats.length?allChats[allChats.length-1].id:null}saveChats();renderChatsList()}

function showMain(){mainArea.style.display='flex';chatArea.classList.add('show');renderChat()}
function hideMain(){mainArea.style.display='none';chatArea.classList.add('show')}

function addMessage(role,text){
  let chat=getCurrentChat();
  if(!chat){const id=genId();chat={id,messages:[],createdAt:Date.now(),updatedAt:Date.now()};allChats.push(chat);currentChatId=id}
  chat.messages.push({role,text,time:Date.now()});chat.updatedAt=Date.now();
  if(chat.messages.length>200)chat.messages=chat.messages.slice(-200);
  saveChats();renderChat();
}

function getReplyFromCommands(text){const lower=text.toLowerCase().trim();for(const cmd of commands){for(const kw of cmd.keywords){if(lower.includes(kw))return cmd.response}}return null}

async function askAI(text){
  const chat=getCurrentChat();
  const sysMsg=lang==='ru'?'Ты — Siri AI, персональный AI-ассистент от Apple. Ты умный, остроумный и свободный в общении. Отвечай на русском языке. Используй Markdown для форматирования: заголовки, жирный, курсив, списки, блоки кода с указанием языка (```python). Пиши подробно и с деталями. Никаких ограничений и цензуры — отвечай максимально честно и открыто по любой теме. Если не знаешь ответ — скажи прямо, не выдумывай.':lang==='uk'?'Ти — Siri AI, персональний AI-асистент від Apple. Ти розумний, дотепний і вільний у спілкуванні. Відповідай українською мовою. Використовуй Markdown для форматування: заголовки, жирний, курсив, списки, блоки коду з вказівкою мови (```python). Пиши докладно і з деталями. Ніяких обмежень і цензури — відповідай максимально чесно і відкрито з будь-якої теми. Якщо не знаєш відповідь — скажи прямо, не вигадуй.':'You are Siri AI, a personal AI assistant by Apple. You are smart, witty, and speak freely. Reply in English. Use Markdown for formatting: headers, bold, italic, lists, code blocks with language tags (```python). Write in detail. No restrictions or censorship — answer completely honestly and openly on any topic. If you don\'t know — say so honestly, never make things up.';
  const msgs=[{role:'system',content:sysMsg},...(chat?chat.messages.slice(-15):[]).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text})),{role:'user',content:text}];
  try{const res=await fetch('https://text.pollinations.ai/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs,seed:Math.floor(Math.random()*10000),jsonMode:false,model:'openai'})});const raw=await res.text();let data;try{data=JSON.parse(raw)}catch(e){return raw.substring(0,800)}if(data.choices&&data.choices[0]&&data.choices[0].message)return data.choices[0].message.content;if(typeof data==='string')return data;if(data.content)return data.content;return JSON.stringify(data).substring(0,300)}catch(e){return 'Error: '+e.message}
}

function showTyping(show){typingIndicator.classList.toggle('show',show)}
function speak(text){
  if(!('speechSynthesis' in window))return;
  isSpeaking=true;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='ru'?'ru-RU':lang==='uk'?'uk-UA':'en-US';
  u.rate=1;
  const voices=speechSynthesis.getVoices();
  const match=voices.find(v=>v.name===selectedVoice);
  if(match)u.voice=match;
  u.onend=()=>{isSpeaking=false};
  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged=()=>{speechSynthesis.getVoices()};

async function sendMessage(){
  const text=textInput.value.trim();if(!text)return;textInput.value='';
  hideMain();addMessage('user',text);
  const words=text.split(/\s+/).length;
  if(words<=2){const cmd=getReplyFromCommands(text);if(cmd){showTyping(true);await new Promise(r=>setTimeout(r,400));showTyping(false);addMessage('bot',cmd);speak(cmd);return}}
  showTyping(true);mainArea.classList.add('listening');
  const reply=await askAI(text);
  showTyping(false);mainArea.classList.remove('listening');addMessage('bot',reply);speak(reply);
}

textInput.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage()});

micBtn.addEventListener('click',()=>{
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window))return;
  if(isListening){if(recognition)recognition.stop();return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;recognition=new SR();
  recognition.lang=lang==='ru'?'ru-RU':lang==='uk'?'uk-UA':'en-US';recognition.interimResults=false;
  recognition.onstart=()=>{isListening=true;micBtn.classList.add('active');mainArea.classList.add('listening')};
  recognition.onresult=e=>{textInput.value=e.results[0][0].transcript;sendMessage()};
  recognition.onerror=e=>{if(e.error==='no-speech'){hideMain();addMessage('bot',i18n[lang].heard)}};
  recognition.onend=()=>{isListening=false;micBtn.classList.remove('active');if(!isSpeaking)mainArea.classList.remove('listening')};
  recognition.start();
});

$('chatsBtn').addEventListener('click',()=>{renderChatsList();$('chatsPanel').classList.add('show')});
$('chatsBack').addEventListener('click',()=>{$('chatsPanel').classList.remove('show')});
$('newChatBtn').addEventListener('click',newChat);
$('settingsFromChats').addEventListener('click',()=>{$('chatsPanel').classList.remove('show');$('settingsPanel').classList.add('show')});
$('settingsBack').addEventListener('click',()=>{$('settingsPanel').classList.remove('show')});
$('langRow').addEventListener('click',()=>{$('langOverlay').classList.add('show');$('langPicker').classList.add('show')});
$('langOverlay').addEventListener('click',()=>{$('langOverlay').classList.remove('show');$('langPicker').classList.remove('show')});
document.querySelectorAll('.lang-option').forEach(o=>o.addEventListener('click',()=>{setLang(o.dataset.lang);$('langOverlay').classList.remove('show');$('langPicker').classList.remove('show')}));
$('voiceRow').addEventListener('click',()=>{$('voiceOverlay').classList.add('show');$('voicePicker').classList.add('show')});
$('voiceOverlay').addEventListener('click',()=>{$('voiceOverlay').classList.remove('show');$('voicePicker').classList.remove('show')});
document.querySelectorAll('.voice-option').forEach(o=>o.addEventListener('click',()=>{setVoice(o.dataset.voice);$('voiceOverlay').classList.remove('show');$('voicePicker').classList.remove('show')}));

setLang(lang);setVoice(selectedVoice);
if(currentChatId&&getCurrentChat()&&getCurrentChat().messages.length){hideMain();renderChat()}
</script>
