<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="initial-scale=1, width=device-width, height=device-height, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="ai-logo.png">
<link rel="manifest" href="manifest.json">
<title>Siri AI v1.1.0 (PWA)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:#000;color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}

  .top-bar{position:absolute;top:max(12px, env(safe-area-inset-top));left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 16px;z-index:10}
  .icon-btn{width:36px;height:36px;background:rgba(255,255,255,0.12);border-radius:50%;border:none;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

  /* CHATS LIST */
  .chats-panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:#000;z-index:100;flex-direction:column;padding-top:env(safe-area-inset-top)}
  .chats-panel.show{display:flex}
  .chats-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:0.5px solid rgba(255,255,255,0.1)}
  .chats-header h3{font-size:17px;font-weight:600}
  .chats-header .new-chat{background:none;border:none;color:#0a84ff;font-size:15px;cursor:pointer}
  .chats-list{flex:1;overflow-y:auto;padding:8px 0}
  .chat-item{padding:14px 16px;border-bottom:0.5px solid rgba(255,255,255,0.06);cursor:pointer;transition:background 0.15s;display:flex;gap:12px;align-items:center}
  .chat-item:active{background:rgba(255,255,255,0.05)}
  .chat-item-icon{width:40px;height:40px;background:rgba(255,255,255,0.08);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
  .chat-item-info{flex:1;min-width:0}
  .chat-item-title{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-item-preview{font-size:13px;color:#8e8e93;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-item-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .chat-item-time{font-size:11px;color:#48484a}
  .chat-item-del{background:none;border:none;color:#48484a;font-size:14px;cursor:pointer;padding:4px}
  .chats-empty{padding:60px 20px;text-align:center;color:#48484a;font-size:15px;line-height:1.5}

  /* SETTINGS */
  .settings-panel{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:#000;z-index:100;flex-direction:column;overflow-y:auto;padding-top:env(safe-area-inset-top)}
  .settings-panel.show{display:flex}
  .settings-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:0.5px solid rgba(255,255,255,0.1)}
  .settings-header .back-btn{background:none;border:none;color:#0a84ff;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:4px}
  .settings-header h3{font-size:17px;font-weight:600}
  .settings-content{flex:1;padding:20px 0}
  .settings-card{background:rgba(255,255,255,0.06);border-radius:14px;margin:0 16px 20px;overflow:hidden}
  .settings-card-header{padding:16px;text-align:center}
  .settings-card-header img{width:60px;height:60px;border-radius:14px;margin-bottom:10px}
  .settings-card-header h2{font-size:18px;font-weight:600;margin-bottom:4px}
  .settings-card-header p{font-size:13px;color:#8e8e93;line-height:1.4}
  .ios-section-title{font-size:13px;color:#8e8e93;text-transform:uppercase;letter-spacing:0.5px;padding:8px 16px 8px 32px}
  .ios-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid rgba(255,255,255,0.06);cursor:pointer;transition:background 0.15s}
  .ios-row:active{background:rgba(255,255,255,0.05)}
  .ios-row:last-child{border-bottom:none}
  .ios-row-left{display:flex;align-items:center;gap:12px}
  .ios-row-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
  .ios-row-label{font-size:16px}
  .ios-row-value{display:flex;align-items:center;gap:6px;color:#8e8e93;font-size:15px}
  .ios-row-value svg{width:14px;height:14px;color:#48484a}

  .lang-picker{display:none;position:absolute;bottom:0;left:0;right:0;background:rgba(28,28,30,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid rgba(255,255,255,0.1);border-radius:14px 14px 0 0;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:200;animation:su 0.3s ease}
  .lang-picker.show{display:block}
  @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .lang-picker-title{text-align:center;font-size:13px;color:#8e8e93;padding:8px 0 12px}
  .lang-option,.voice-option{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.06);border-radius:10px;margin-bottom:2px;cursor:pointer}
  .lang-option span,.voice-option span{font-size:16px}
  .lang-option .check,.voice-option .check{color:#30d158;font-size:18px;display:none}
  .lang-option.active .check,.voice-option.active .check{display:block}
  .overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:150}
  .overlay.show{display:block}

  .center-area{flex:1;display:flex;align-items:center;justify-content:center}
  .siri-orb{width:160px;height:160px;animation:orbFloat 4s ease-in-out infinite}
  @keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.02)}}
  .siri-orb img{width:160px;height:160px;object-fit:contain}

  .chat-area{flex:1;overflow-y:auto;padding:calc(60px + env(safe-area-inset-top)) 16px 10px;display:none;flex-direction:column;gap:10px}
  .chat-area.show{display:flex}
  .chat-msg{max-width:80%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.4;animation:fi 0.3s ease;word-wrap:break-word;white-space:pre-wrap}
  .chat-msg.user{align-self:flex-end;background:#0a84ff;color:#fff;border-bottom-right-radius:4px}
  .chat-msg.bot{align-self:flex-start;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.9);border-bottom-left-radius:4px}
  .chat-msg.bot code{background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:4px;font-family:'SF Mono',monospace;font-size:13px}
  .chat-msg.bot pre{background:rgba(0,0,0,0.4);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;position:relative}
  .chat-msg.bot pre code{background:none;padding:0;font-size:13px;line-height:1.4;white-space:pre}
  .chat-msg.bot strong{color:#fff}
  @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .bottom-bar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px calc(12px + env(safe-area-inset-bottom))}
  .btn-plus{width:44px;height:44px;background:rgba(255,255,255,0.12);border-radius:50%;border:none;color:#8e8e93;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .input-wrap{flex:1}
  .input-wrap input{width:100%;height:44px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);border-radius:22px;padding:0 18px;color:#fff;font-size:16px;outline:none}
  .input-wrap input::placeholder{color:#8e8e93}
  .btn-mic{width:44px;height:44px;background:rgba(255,255,255,0.12);border-radius:50%;border:none;color:#8e8e93;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .btn-mic.active{background:rgba(48,209,88,0.25);color:#30d158;animation:mp 1s ease-in-out infinite}
  @keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(48,209,88,0.4)}50%{box-shadow:0 0 0 8px rgba(48,209,88,0)}}

  .voice-waves{display:none;gap:3px;align-items:center;justify-content:center;height:30px;margin-bottom:10px}
  .listening .voice-waves{display:flex}
  .voice-waves span{width:3px;height:6px;background:#30d158;border-radius:2px;animation:wv 0.6s ease-in-out infinite}
  @keyframes wv{0%,100%{height:6px}50%{height:22px}}

  .typing-indicator{display:none;align-self:flex-start;padding:12px 16px;background:rgba(255,255,255,0.1);border-radius:18px;border-bottom-left-radius:4px;gap:4px;margin-left:16px;margin-bottom:10px}
  .typing-indicator.show{display:flex}
  .typing-indicator span{width:6px;height:6px;background:rgba(255,255,255,0.4);border-radius:50%;animation:td 1.4s ease-in-out infinite}
  @keyframes td{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
  <div class="top-bar" id="topBar">
    <button class="icon-btn" id="chatsBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </button>
  </div>

  <!-- CHATS -->
  <div class="chats-panel" id="chatsPanel">
    <div class="chats-header">
      <button class="back-btn" id="chatsBack" style="background:none;border:none;color:#0a84ff;font-size:16px;cursor:pointer;display:flex;align-items:center;gap:4px">
        <svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="#0a84ff" stroke-width="2"><polyline points="8 2 2 8 8 14"/></svg>
        <span id="chatsBackText">Назад</span>
      </button>
      <h3 id="chatsTitle">Чаты</h3>
      <button class="new-chat" id="newChatBtn">+ Новый</button>
    </div>
    <div class="chats-list" id="chatsList"></div>
    <div style="padding:12px 16px">
      <button class="icon-btn" id="settingsFromChats" style="width:100%;border-radius:14px;height:44px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(255,255,255,0.06)">
        <span id="settingsLabel">Настройки</span>
      </button>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <button class="back-btn" id="settingsBack"><svg width="10" height="16" viewBox="0 0 10 16" fill="none" stroke="#0a84ff" stroke-width="2"><polyline points="8 2 2 8 8 14"/></svg><span id="settingsBackText">Назад</span></button>
      <h3>Apple Intelligence & Siri</h3>
      <div style="width:60px"></div>
    </div>
    <div class="settings-content">
      <div class="settings-card">

          <img src="ai-logo.png" alt="Siri AI">

          <p>Персональный AI-ассистент.</p>
        </div>
      </div>
      <div class="ios-section-title">SIRI REQUESTS</div>
      <div class="settings-card">
        <div class="ios-row" id="langRow">
          <div class="ios-row-left"><span class="ios-row-label" id="labelLang">Язык</span></div>
          <div class="ios-row-value"><span id="currentLang">Русский</span></div>
        </div>
        <div class="ios-row" id="voiceRow">
          <div class="ios-row-left"><span class="ios-row-label" id="labelVoice">Голос</span></div>
          <div class="ios-row-value"><span id="currentVoice">Milena</span></div>
        </div>

  <!-- LANG & VOICE PICKERS -->
  <div class="overlay" id="langOverlay"></div>
  <div class="lang-picker" id="langPicker">
    <div class="lang-picker-title" id="langPickerTitle">Язык Siri</div>
    <div class="lang-option active" data-lang="ru"><span>Русский</span><span class="check">&#10003;</span></div>
    <div class="lang-option" data-lang="uk"><span>Українська</span><span class="check">&#10003;</span></div>
  </div>

  <div class="overlay" id="voiceOverlay"></div>
  <div class="lang-picker" id="voicePicker">
    <div class="lang-picker-title" id="voicePickerTitle">Голос</div>
    <div class="voice-option active" data-voice="Milena"><span>Milena (RU)</span><span class="check">&#10003;</span></div>
    <div class="voice-option" data-voice="Maxim"><span>Maxim (RU)</span><span class="check">&#10003;</span></div>
  </div>

  <!-- MAIN AREA -->
  <div class="center-area" id="mainArea">
    <div class="voice-waves" id="voiceWaves"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="siri-orb" id="siriOrb"><img src="ai-logo.png" alt="Siri AI"></div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>
  
  <div class="bottom-bar" id="bottomBar">
    <button class="btn-plus" id="plusBtn">+</button>
    <div class="input-wrap"><input type="text" id="textInput" placeholder="Спросить Siri" autocomplete="off"/></div>
    <button class="btn-mic" id="micBtn"><svg width="18" height="24" viewBox="0 0 18 24" fill="none"><rect x="5" y="1" width="8" height="14" rx="4" stroke="currentColor" stroke-width="1.8"/><path d="M1 11C1 15.4 4.6 19 9 19C13.4 19 17 15.4 17 11" stroke="currentColor" stroke-width="1.8"/><line x1="9" y1="19" x2="9" y2="23" stroke="currentColor" stroke-width="1.8"/></svg></button>
  </div>

<script src="commands.js"></script>
<script>
// РЕГИСТРАЦИЯ SERVICE WORKER (ДЛЯ PWA)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
}

const API_KEY='AIzaSyDiCBTa9zXsf1E4NsiU2gizfUCmAqO9uyo';
const API_URL=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${API_KEY}`;

const i18n={
  ru:{placeholder:'Спросить Siri',back:'Назад',chats:'Чаты',newChat:'+ Новый',settings:'Настройки',empty:'Нет чатов. Нажмите + чтобы начать.',heard:'Я тебя не услышал.'},
  uk:{placeholder:'Запитати Siri',back:'Назад',chats:'Чати',newChat:'+ Новий',settings:'Налаштування',empty:'Немає чатів.',heard:'Я тебе не почув.'}
};

let lang=localStorage.getItem('siri_lang')||'ru';
let selectedVoice=localStorage.getItem('siri_voice')||'Milena';
let allChats=JSON.parse(localStorage.getItem('siri_chats')||'[]');
let currentChatId=localStorage.getItem('siri_current_chat')||null;
let isListening=false;
let recognition=null;

const $=id=>document.getElementById(id);
const textInput=$('textInput'),micBtn=$('micBtn'),mainArea=$('mainArea'),chatArea=$('chatArea'),typingIndicator=$('typingIndicator');

window.addEventListener("DOMContentLoaded", () => {
  setLang(lang);
  setVoice(selectedVoice);
  initSpeechRecognition();
  if(currentChatId&&getCurrentChat()&&getCurrentChat().messages.length){hideMain();renderChat()}
});

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function getCurrentChat(){return allChats.find(c=>c.id===currentChatId)}
function saveChats(){localStorage.setItem('siri_chats',JSON.stringify(allChats));if(currentChatId)localStorage.setItem('siri_current_chat',currentChatId)}

function setLang(l){
  lang=l;localStorage.setItem('siri_lang',l);const t=i18n[l]||i18n.ru;
  textInput.placeholder=t.placeholder;
  $('chatsBackText').textContent=t.back;$('chatsTitle').textContent=t.chats;$('newChatBtn').textContent=t.newChat;$('settingsLabel').textContent=t.settings;
  $('settingsBackText').textContent=t.back;$('labelLang').textContent=t.lang||'Язык';$('labelVoice').textContent=t.voice||'Голос';
  $('langPickerTitle').textContent=t.langTitle||'Язык Siri';$('voicePickerTitle').textContent=t.voiceTitle||'Голос';
  $('currentLang').textContent=l==='ru'?'Русский':'Українська';
  document.querySelectorAll('.lang-option').forEach(o=>o.classList.toggle('active',o.dataset.lang===l));
  if(recognition) recognition.lang = l==='ru'?'ru-RU':'uk-UA';
}

function setVoice(name){
  selectedVoice=name;localStorage.setItem('siri_voice',name);
  $('currentVoice').textContent=name;
  document.querySelectorAll('.voice-option').forEach(o=>o.classList.toggle('active',o.dataset.voice===name));
}

function renderMarkdown(text){
  let h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(m,lang,code)=>`<pre><code class="lang-${lang}">${code}</code></pre>`);
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  
  h=h.split(/<pre>[\s\S]*?<\/pre>/g).map((part, index, array) => {
     if (index < array.length - 1) {
         const match = text.match(/<pre>[\s\S]*?<\/pre>/g)[index];
         return part.replace(/\n/g, '<br>') + match;
     }
     return part.replace(/\n/g, '<br>');
  }).join('');
  return h;
}

function renderChat(){
  chatArea.innerHTML='';const chat=getCurrentChat();
  if(!chat||!chat.messages.length)return;
  chat.messages.forEach(msg=>{
    const div=document.createElement('div');div.className='chat-msg '+(msg.role==='user'?'user':'bot');
    div.innerHTML=msg.role==='bot'?renderMarkdown(msg.text):msg.text;chatArea.appendChild(div);
  });
  chatArea.scrollTop=chatArea.scrollHeight;
}

function renderChatsList(){
  const list=$('chatsList'),t=i18n[lang]||i18n.ru;
  if(!allChats.length){list.innerHTML='<div class="chats-empty">'+t.empty+'</div>';return}
  list.innerHTML='';
  allChats.slice().reverse().forEach(chat=>{
    const div=document.createElement('div');div.className='chat-item';
    const firstMsg=chat.messages.find(m=>m.role==='user');
    const title=firstMsg?firstMsg.text.substring(0,40):(lang==='ru'?'Новый чат':'Новий чат');
    const lastMsg=chat.messages[chat.messages.length-1];
    const preview=lastMsg?lastMsg.text.substring(0,60):'';
    div.innerHTML=`<div class="chat-item-icon">💬</div><div class="chat-item-info"><div class="chat-item-title">${title}</div><div class="chat-item-preview">${preview}</div></div><div class="chat-item-meta"><button class="chat-item-del" data-id="${chat.id}">✕</button></div>`;
    div.onclick=(e)=>{if(e.target.classList.contains('chat-item-del'))return;openChat(chat.id)};
    list.appendChild(div);
  });
  list.querySelectorAll('.chat-item-del').forEach(btn=>{
    btn.onclick=(e)=>{e.stopPropagation();deleteChat(btn.dataset.id)};
  });
}

function newChat(){const id=genId();allChats.push({id,messages:[],createdAt:Date.now(),updatedAt:Date.now()});currentChatId=id;saveChats();$('chatsPanel').classList.remove('show');showMain()}
function openChat(id){currentChatId=id;saveChats();$('chatsPanel').classList.remove('show');showMain();renderChat()}
function deleteChat(id){allChats=allChats.filter(c=>c.id!==id);if(currentChatId===id){currentChatId=allChats.length?allChats[allChats.length-1].id:null}saveChats();renderChatsList()}
function showMain(){mainArea.style.display='flex';chatArea.classList.add('show');renderChat()}
function hideMain(){mainArea.style.display='none';chatArea.classList.add('show')}

function addMessage(role,text){
  let chat=getCurrentChat();
  if(!chat){const id=genId();chat={id,messages:[],createdAt:Date.now(),updatedAt:Date.now()};allChats.push(chat);currentChatId=id}
  chat.messages.push({role,text,time:Date.now()});chat.updatedAt=Date.now();
  saveChats();renderChat();
}

function getReplyFromCommands(text){const lower=text.toLowerCase().trim();for(const cmd of commands){for(const kw of cmd.keywords){if(lower.includes(kw))return cmd.response}}return null}

async function askAI(text) {
  const chat = getCurrentChat();
  const sysMsg = lang==='ru'?'Ты — Siri AI от Apple. Отвечай подробно на русском. Используй Markdown.':'Ти — Siri AI від Apple. Відповідай українською.';
  const contents = [];
  (chat ? chat.messages.slice(-15) : []).forEach(m => {
      contents.push({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] });
  });
  contents.push({ role: 'user', parts: [{ text: text }] });

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: contents, systemInstruction: { parts: [{ text: sysMsg }] } })
    });
    const data = await res.json();
    return data.candidates[0].content.parts[0].text;
  } catch(e) { return 'Error: ' + e.message; }
}

function showTyping(show){typingIndicator.classList.toggle('show',show)}

function speak(text){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace(/[#*`_\-\[\]()]/g, ''));
  u.lang=lang==='ru'?'ru-RU':'uk-UA';
  u.rate=1.1;
  speechSynthesis.speak(u);
}

async function sendMessage(){
  const text=textInput.value.trim();if(!text)return;textInput.value='';
  hideMain();addMessage('user',text);
  const cmd=getReplyFromCommands(text);
  if(cmd){showTyping(true);await new Promise(r=>setTimeout(r,400));showTyping(false);addMessage('bot',cmd);speak(cmd);return}
  showTyping(true);mainArea.classList.add('listening');
  const reply=await askAI(text);
  showTyping(false);mainArea.classList.remove('listening');addMessage('bot',reply);speak(reply);
}

textInput.addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage()});

// БРАУЗЕРНОЕ РАСПОЗНАВАНИЕ РЕЧИ (PWA)
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = lang==='ru'?'ru-RU':'uk-UA';

  recognition.onstart = () => { isListening = true; micBtn.classList.add('active'); mainArea.classList.add('listening'); };
  recognition.onend = () => { isListening = false; micBtn.classList.remove('active'); mainArea.classList.remove('listening'); };
  
  recognition.onresult = (e) => {
    const result = e.results[0][0].transcript;
    if (result) { textInput.value = result; sendMessage(); }
  };
  recognition.onerror = () => { hideMain(); addMessage('bot', i18n[lang].heard); };
}

micBtn.addEventListener('click', () => {
  if (!recognition) { alert("Речевой ввод не поддерживается в этом браузере."); return; }
  if (isListening) { recognition.stop(); } else { recognition.start(); }
});

document.querySelectorAll('.voice-option').forEach(o=>o.addEventListener('click',()=>{setVoice(o.dataset.voice);$('voiceOverlay').classList.remove('show');$('voicePicker').classList.remove('show')}));
